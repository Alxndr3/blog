{% extends "blogs/base.html" %}
{% block content %}
  <p>Post: {{ post.title }}</p>
  <ul>
    <li>
      <p>{{ post.text|linebreaks }}</p>
      <p>{{ post.date_added|date:'M d, Y H:i' }}</p>
      <p>
      <a href="{% url 'blogs:edit_post' post.id %}">Edit post</a>
      </p>
    </li>
  </ul>
{% endblock %}
